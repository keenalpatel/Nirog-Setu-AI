<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirog-Setu AI - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; min-height: 100vh; flex-direction: column; display: flex; }

        /* Aurora Background */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f172a 25%, #1e1b4b 50%, #0f172a 75%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: auroraFlow 15s ease infinite;
            z-index: -3;
        }
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
        }
        
        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 30%, #818cf8 60%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Neon Glow */
        .neon-glow {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5), 0 0 40px rgba(99, 102, 241, 0.3);
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        .btn-primary::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::after { left: 100%; }

        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.25);
        }

        /* Form Inputs */
        .custom-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Aurora Background -->
    <div class="aurora-bg"></div>

    <!-- Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Top Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 glass px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg font-bold text-white tracking-tight text-sm">
                    NS
                </div>
                <span class="font-semibold text-lg tracking-wider">Nirog-Setu AI</span>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <main class="flex-grow pt-32 pb-8 px-4 flex flex-col items-center justify-center relative z-10">
        
        <!-- MAIN AUTH CARD -->
        <div class="w-full max-w-lg glass-card rounded-2xl p-8 space-y-6 fade-in">
            <div class="text-center space-y-3">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg font-bold text-white tracking-tight text-base mx-auto mb-2 shadow-indigo-500/20">
                    NS
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight gradient-text">Welcome to Nirog-Setu AI</h2>
                <p id="viewSubtitle" class="text-gray-400 text-sm max-w-sm mx-auto">
                    Please log in to your account to begin your AI healthcare consultation.
                </p>
            </div>

            <!-- Context Switcher Toggles -->
            <div class="grid grid-cols-2 p-1 bg-white/5 rounded-xl border border-white/10">
                <button type="button" id="toggleSignIn" class="py-2.5 text-sm font-semibold rounded-lg transition-all bg-indigo-600 text-white shadow-md">
                    Sign In
                </button>
                <button type="button" id="toggleSignUp" class="py-2.5 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-white">
                    New Account
                </button>
            </div>
            
            <form id="authForm" class="space-y-5" onsubmit="event.preventDefault();">
                <!-- Full Name Field (Hidden on Sign In by default) -->
                <div id="nameFieldWrapper" class="hidden">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Full Name *</label>
                    <input type="text" id="fullName" placeholder="John Doe" class="custom-input w-full px-4 py-3 rounded-xl text-white placeholder-gray-600">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address *</label>
                    <input type="email" id="emailAddr" placeholder="name@example.com" class="custom-input w-full px-4 py-3 rounded-xl text-white placeholder-gray-600" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Mobile Number *</label>
                    <input type="tel" id="mobileNum" placeholder="+91 XXXXX XXXXX" class="custom-input w-full px-4 py-3 rounded-xl text-white placeholder-gray-600" required>
                </div>
                
                <!-- Location Access Block -->
                <div class="pt-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Allow Location Access *</label>
                    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                        <button type="button" id="locationBtn" class="btn-secondary px-4 py-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2 bg-white/5 whitespace-nowrap">
                            <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25s-7.5-4.108-7.5-11.25a7.5 7.5 0 1115 0z" />
                            </svg>
                            Share Current Location
                        </button>
                        <div id="locationStatus" class="text-xs text-gray-400 flex items-center">
                            Required to map region insights.
                        </div>
                    </div>
                </div>

                <!-- Error Field -->
                <div id="formError" class="text-sm text-red-400 hidden bg-red-500/10 border border-red-500/20 px-4 py-3 rounded-xl"></div>

                <!-- Main Submit Action Inside Card -->
                <button type="submit" id="submitBtn" class="btn-primary w-full py-4 rounded-xl font-bold tracking-wide shadow-lg shadow-indigo-500/20 text-sm uppercase mt-4">
                    Login
                </button>
            </form>
        </div>
    </main>

    <!-- FOOTER ACCESSWAY -->
    <footer class="w-full relative z-10 py-8 px-4 flex flex-col items-center border-t border-white/5 bg-black/20 backdrop-blur-sm">
        <p class="text-xs text-gray-500 mb-3 tracking-wide">Prefer skipping portal access details completely?</p>
        <a href="https://wa.me/919999999999" class="btn-secondary text-sm font-medium tracking-wide text-indigo-300 hover:text-white px-6 py-3 rounded-xl flex items-center gap-2 bg-white/5 transition-all duration-300 transform hover:-translate-y-0.5">
            <!-- WhatsApp Brand Icon Shape -->
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.42 9.864-9.858.002-2.634-1.023-5.11-2.885-6.974C16.526 1.949 14.053.924 11.43.923c-5.441 0-9.865 4.422-9.869 9.86-.001 1.718.454 3.39 1.316 4.873L1.81 22.22l6.837-1.794z"/>
            </svg>
            Continue to Chat on WhatsApp
        </a>
    </footer>

    <!-- Business Script Logic -->
    <script>
        const authForm = document.getElementById('authForm');
        const toggleSignIn = document.getElementById('toggleSignIn');
        const toggleSignUp = document.getElementById('toggleSignUp');
        
        const nameFieldWrapper = document.getElementById('nameFieldWrapper');
        const fullName = document.getElementById('fullName');
        const emailAddr = document.getElementById('emailAddr');
        const mobileNum = document.getElementById('mobileNum');
        const locationBtn = document.getElementById('locationBtn');
        const locationStatus = document.getElementById('locationStatus');
        const formError = document.getElementById('formError');
        const submitBtn = document.getElementById('submitBtn');
        const viewSubtitle = document.getElementById('viewSubtitle');

        let isNewUserMode = false;
        let userCoordinates = null;

        // Switch layout state to "Sign In"
        toggleSignIn.addEventListener('click', () => {
            isNewUserMode = false;
            nameFieldWrapper.classList.add('hidden');
            fullName.removeAttribute('required');
            submitBtn.textContent = "Login";
            viewSubtitle.textContent = "Please log in to your account to begin your AI healthcare consultation.";
            
            // UI Button adjustments
            toggleSignIn.className = "py-2.5 text-sm font-semibold rounded-lg transition-all bg-indigo-600 text-white shadow-md";
            toggleSignUp.className = "py-2.5 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-white";
            formError.classList.add('hidden');
        });

        // Switch layout state to "New User Account Creation"
        toggleSignUp.addEventListener('click', () => {
            isNewUserMode = true;
            nameFieldWrapper.classList.remove('hidden');
            fullName.setAttribute('required', '');
            submitBtn.textContent = "Create Account";
            viewSubtitle.textContent = "Please provide your details to begin your AI healthcare consultation.";
            
            // UI Button adjustments
            toggleSignUp.className = "py-2.5 text-sm font-semibold rounded-lg transition-all bg-indigo-600 text-white shadow-md";
            toggleSignIn.className = "py-2.5 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-white";
            formError.classList.add('hidden');
        });

        // Location capturing logic
        locationBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                locationStatus.innerHTML = "<span class='text-red-400'>Geolocation not supported by browser.</span>";
                return;
            }
            locationStatus.innerHTML = "<span class='text-indigo-400 animate-pulse'>Requesting access...</span>";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoordinates = { lat: position.coords.latitude, lng: position.coords.longitude };
                    locationStatus.innerHTML = "<span class='text-emerald-400 font-medium flex items-center gap-1'>✓ Location shared successfully.</span>";
                    locationBtn.classList.add('border-emerald-500/30', 'bg-emerald-500/10');
                    formError.classList.add('hidden');
                },
                (error) => {
                    userCoordinates = null;
                    locationStatus.innerHTML = "<span class='text-red-400'>Permission denied. Location access required.</span>";
                }
            );
        });

        // Form Processors
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            formError.classList.add('hidden');

            if (isNewUserMode && !fullName.value.trim()) {
                formError.textContent = "Please fill out your Name to construct your registration profile.";
                formError.classList.remove('hidden');
                return;
            }

            if (!emailAddr.value.trim() || !mobileNum.value.trim()) {
                formError.textContent = "Please fill in all basic identification elements.";
                formError.classList.remove('hidden');
                return;
            }

            if (!userCoordinates) {
                formError.textContent = "Please share your current location permissions before validation.";
                formError.classList.remove('hidden');
                return;
            }

            // Successfully processed - redirecting to primary platform interface baseline simulation
            alert(isNewUserMode ? "Account creation successful! Routing to system interface..." : "Login sequence successful!");
            window.location.href = "https://wa.me/919999999999";
        });

        // Background Particle Engine loop
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.alpha = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
